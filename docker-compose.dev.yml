version: '3.8'

# Development environment with live code updates
# Usage: docker-compose -f docker-compose.dev.yml up

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: samycastro-web-dev
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      - ./uploads:/var/www/html/uploads
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-samlavet}
      - DB_USER=${DB_USER:-samlavet_user}
      - DB_PASS=${DB_PASS:-samlavet_password}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - samycastro-network
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: samycastro-db-dev
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-samlavet}
      MYSQL_USER: ${DB_USER:-samlavet_user}
      MYSQL_PASSWORD: ${DB_PASS:-samlavet_password}
    volumes:
      - mysql-data-dev:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "3306:3306"
    networks:
      - samycastro-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: samycastro-phpmyadmin-dev
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ${DB_USER:-samlavet_user}
      PMA_PASSWORD: ${DB_PASS:-samlavet_password}
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - samycastro-network
    restart: unless-stopped

networks:
  samycastro-network:
    driver: bridge

volumes:
  mysql-data-dev:
    driver: local
